name: Build Android

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # استخدام الإصدار 21 لحل مشكلة السيرفر تماماً
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # إعطاء الصلاحيات لملف البناء
      - name: Grant Execute Permission for Gradle
        run: chmod +x android/gradlew

      # بناء التطبيق مباشرة
      - name: Build Android APK
        run: |
          cd android
          ./gradlew assembleDebug

      # رفع الملف الناتج لتحميله
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
